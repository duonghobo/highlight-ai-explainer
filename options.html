<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Highlight AI Explainer — Options</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #1f1f24;
      color: #e8e8ec;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 { font-size: 18px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #3a3a42;
      background: #2a2a31;
      color: #e8e8ec;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4c8dff;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #3a7bee; }
    #status { margin-left: 10px; color: #7fd18a; }
    a { color: #9fd0ff; }
    p.hint { color: #9a9aa4; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Highlight AI Explainer</h1>
  <label for="key">Gemini API key</label>
  <input id="key" type="password" placeholder="AIza..." />
  <p class="hint">
    Get a free key at
    <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>.
    Stored only in your Chrome sync storage.
  </p>
  <button id="save">Save</button><span id="status"></span>
  <script src="options.js"></script>
</body>
</html>
